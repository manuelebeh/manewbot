name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check secrets not tracked
        run: npm run check:secrets

      - name: Syntax check
        run: npm run check:syntax

      - name: Unit tests
        run: npm test

      - name: ESLint
        run: npm run lint
